server:
  port: 8080

app:
  cors:
    allowed-origins: http://localhost:3000,http://127.0.0.1:3000
  upload:
    dir: uploads
  frontend:
    base-url: ${FRONTEND_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:noreply@cinesaojose.com}
  password-reset:
    expiration-minutes: 15
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    facebook:
      app-id: ${FACEBOOK_APP_ID:}
      app-secret: ${FACEBOOK_APP_SECRET:}

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  application:
    name: pajeu-ticket-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cinepajeu}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      # schema-patch: idempotente (ALTER IF NOT EXISTS). import.sql NÃO roda aqui —
      # senão filmes/produtos de exemplo voltam a cada restart (sem UNIQUE em titulo/nome).
      mode: always
      schema-locations: classpath:schema-patch.sql
      continue-on-error: true

# JWT configuration settings
api:
  security:
    token:
      secret: ${JWT_SECRET:3c9e4b2d5f8e1a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0a9b8c7d6e5f4g3}
      expiration: 86400000 # 24 hours in milliseconds
      refresh-expiration: 604800000 # 7 days in milliseconds

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
